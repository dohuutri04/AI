<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Danh Mục — EduConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../static/css/admin.css">
</head>
<body class="admin-body">

<aside class="admin-sidebar" id="admin-sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">🎓</span>
    <span class="brand-text">Edu<strong>Admin</strong></span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group">
      <span class="nav-group-label">Tổng Quan</span>
      <a href="dashboard.html" class="sidebar-link">
        <span class="sl-icon">📊</span> Dashboard
      </a>
    </div>
    <div class="nav-group">
      <span class="nav-group-label">Quản Lý</span>
      <a href="courses.html" class="sidebar-link">
        <span class="sl-icon">📚</span> Khóa Học
      </a>
      <a href="users.html" class="sidebar-link">
        <span class="sl-icon">👥</span> Học Viên
      </a>
      <a href="categories.html" class="sidebar-link active">
        <span class="sl-icon">🏷️</span> Danh Mục
      </a>
      <a href="contacts.html" class="sidebar-link">
        <span class="sl-icon">✉️</span> Liên Hệ
      </a>
    </div>
    <div class="nav-group">
      <span class="nav-group-label">Hệ Thống</span>
      <a href="/" target="_blank" class="sidebar-link">
        <span class="sl-icon">🌐</span> Xem Website
      </a>
      <a href="/admin/logout" class="sidebar-link sidebar-logout">
        <span class="sl-icon">🚪</span> Đăng Xuất
      </a>
    </div>
  </nav>
  <div class="sidebar-user">
    <div class="su-avatar" id="user-avatar">A</div>
    <div class="su-info">
      <strong id="user-name">Admin</strong>
      <span>Quản Trị Viên</span>
    </div>
  </div>
</aside>

<div class="admin-main" id="admin-main">
  <header class="admin-topbar">
    <button class="topbar-toggle" onclick="toggleSidebar()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-breadcrumb">
      <a href="dashboard.html" class="breadcrumb-home">🏠</a>
      <span class="breadcrumb-sep">›</span>
      <span class="topbar-title">Quản Lý Danh Mục</span>
    </div>
    <div class="topbar-actions">
      <a href="/" target="_blank" class="topbar-btn" title="Xem website">🌐</a>
      <a href="/admin/logout" class="topbar-btn topbar-logout" title="Đăng xuất">🚪</a>
    </div>
  </header>

  <div class="admin-content">
    <div class="admin-toolbar">
      <button class="toolbar-btn" onclick="openModal('modal-add-category')">+ Danh Mục Mới</button>
      <span class="toolbar-info">Tổng: <strong id="total-categories">0</strong> danh mục</span>
    </div>

    <div class="dash-card">
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tên Danh Mục</th>
              <th>Slug</th>
              <th>Khóa Học</th>
              <th>Thao Tác</th>
            </tr>
          </thead>
          <tbody id="categories-table">
            <tr><td colspan="5" class="td-empty">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal add/edit category -->
<div class="admin-modal-overlay" id="modal-add-category" onclick="closeAdminModal(event,'modal-add-category')">
  <div class="admin-modal">
    <div class="am-header">
      <h2>🏷️ Thêm Danh Mục</h2>
      <button onclick="closeModal('modal-add-category')">✕</button>
    </div>
    <form class="am-form" onsubmit="saveCategory(event)">
      <input type="hidden" id="category-id" value="">
      <div class="am-field">
        <label>Tên Danh Mục</label>
        <input type="text" id="category-name" required>
      </div>
      <div class="am-field">
        <label>Slug (tự động)</label>
        <input type="text" id="category-slug" readonly>
      </div>
      <div class="am-footer">
        <button type="button" onclick="closeModal('modal-add-category')" class="btn-admin-ghost">Hủy</button>
        <button type="submit" class="btn-admin-primary">Lưu Danh Mục</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal confirm delete -->
<div class="admin-modal-overlay" id="modal-confirm-delete" onclick="closeAdminModal(event,'modal-confirm-delete')">
  <div class="admin-modal admin-modal-sm">
    <div class="am-header">
      <h2>⚠️ Xác Nhận Xóa</h2>
      <button onclick="closeModal('modal-confirm-delete')">✕</button>
    </div>
    <div class="am-confirm-body">
      <p>Xóa danh mục: <strong id="delete-category-name"></strong>?</p>
    </div>
    <div class="am-footer">
      <button onclick="closeModal('modal-confirm-delete')" class="btn-admin-ghost">Hủy</button>
      <button id="btn-confirm-delete" class="btn-admin-danger">Xóa Danh Mục</button>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="admin-toast" id="admin-toast"></div>

<script src="../../static/js/admin.js"></script>
<script>
let deleteCategoryId = null;

function slugify(text) {
  return text
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^\w\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-');
}

async function loadCategories() {
  const res = await fetch('/api/admin/categories');
  const data = await res.json();
  
  document.getElementById('total-categories').textContent = data.total || 0;
  
  const tbody = document.getElementById('categories-table');
  if (!data.categories || data.categories.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="td-empty">Không tìm thấy danh mục nào.</td></tr>';
  } else {
    tbody.innerHTML = data.categories.map(c => `
      <tr>
        <td class="td-id">${c.id}</td>
        <td><strong>${c.name}</strong></td>
        <td><code>${c.slug}</code></td>
        <td><span class="badge-enroll">${c.course_count || 0}</span></td>
        <td>
          <div class="td-actions">
            <button class="btn-view" onclick="editCategory(${c.id})" title="Sửa">✏️</button>
            <button class="btn-delete" onclick="deleteCategory(${c.id}, '${c.name}')" title="Xóa">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  }
}

document.getElementById('category-name').addEventListener('input', (e) => {
  document.getElementById('category-slug').value = slugify(e.target.value);
});

async function editCategory(id) {
  const res = await fetch(`/api/admin/categories/${id}`);
  const data = await res.json();
  const c = data.category;
  
  document.getElementById('category-id').value = c.id;
  document.getElementById('category-name').value = c.name;
  document.getElementById('category-slug').value = c.slug;
  
  document.querySelector('#modal-add-category .am-header h2').textContent = '✏️ Sửa Danh Mục';
  openModal('modal-add-category');
}

async function saveCategory(e) {
  e.preventDefault();
  const id = document.getElementById('category-id').value;
  const method = id ? 'PUT' : 'POST';
  const url = id ? `/api/admin/categories/${id}` : '/api/admin/categories';
  
  const form = new FormData();
  form.append('name', document.getElementById('category-name').value);
  form.append('slug', document.getElementById('category-slug').value);
  
  const res = await fetch(url, {method, body: form});
  const data = await res.json();
  
  showAdminToast(data.message, data.success ? 'success' : 'error');
  if (data.success) {
    closeModal('modal-add-category');
    loadCategories();
  }
}

function deleteCategory(id, name) {
  deleteCategoryId = id;
  document.getElementById('delete-category-name').textContent = name;
  openModal('modal-confirm-delete');
}

document.getElementById('btn-confirm-delete').addEventListener('click', async () => {
  if (!deleteCategoryId) return;
  const res = await fetch(`/api/admin/categories/${deleteCategoryId}`, {method:'DELETE'});
  const data = await res.json();
  showAdminToast(data.message, data.success ? 'success' : 'error');
  if (data.success) {
    closeModal('modal-confirm-delete');
    loadCategories();
  }
});

document.addEventListener('DOMContentLoaded', loadCategories);
</script>
</body>
</html>
