<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Khóa Học — EduConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../static/css/admin.css">
</head>
<body class="admin-body">

<aside class="admin-sidebar" id="admin-sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">🎓</span>
    <span class="brand-text">Edu<strong>Admin</strong></span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group">
      <span class="nav-group-label">Tổng Quan</span>
      <a href="dashboard.html" class="sidebar-link">
        <span class="sl-icon">📊</span> Dashboard
      </a>
    </div>
    <div class="nav-group">
      <span class="nav-group-label">Quản Lý</span>
      <a href="courses.html" class="sidebar-link active">
        <span class="sl-icon">📚</span> Khóa Học
      </a>
      <a href="users.html" class="sidebar-link">
        <span class="sl-icon">👥</span> Học Viên
      </a>
      <a href="categories.html" class="sidebar-link">
        <span class="sl-icon">🏷️</span> Danh Mục
      </a>
      <a href="contacts.html" class="sidebar-link">
        <span class="sl-icon">✉️</span> Liên Hệ
      </a>
    </div>
    <div class="nav-group">
      <span class="nav-group-label">Hệ Thống</span>
      <a href="/" target="_blank" class="sidebar-link">
        <span class="sl-icon">🌐</span> Xem Website
      </a>
      <a href="/admin/logout" class="sidebar-link sidebar-logout">
        <span class="sl-icon">🚪</span> Đăng Xuất
      </a>
    </div>
  </nav>
  <div class="sidebar-user">
    <div class="su-avatar" id="user-avatar">A</div>
    <div class="su-info">
      <strong id="user-name">Admin</strong>
      <span>Quản Trị Viên</span>
    </div>
  </div>
</aside>

<div class="admin-main" id="admin-main">
  <header class="admin-topbar">
    <button class="topbar-toggle" onclick="toggleSidebar()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-breadcrumb">
      <a href="dashboard.html" class="breadcrumb-home">🏠</a>
      <span class="breadcrumb-sep">›</span>
      <span class="topbar-title">Quản Lý Khóa Học</span>
    </div>
    <div class="topbar-actions">
      <a href="/" target="_blank" class="topbar-btn" title="Xem website">🌐</a>
      <a href="/admin/logout" class="topbar-btn topbar-logout" title="Đăng xuất">🚪</a>
    </div>
  </header>

  <div class="admin-content">
    <div class="admin-toolbar">
      <form class="toolbar-search" onsubmit="searchCourses(event)">
        <input type="text" id="search-input" name="q" placeholder="Tìm tên khóa học...">
        <button type="submit">🔍</button>
        <a href="#" class="clear-search" onclick="clearSearch(event)" id="clear-btn" style="display:none;">✕</a>
      </form>
      <button class="toolbar-btn" onclick="openModal('modal-add-course')">+ Khóa Học Mới</button>
      <span class="toolbar-info">Tổng: <strong id="total-courses">0</strong> khóa</span>
    </div>

    <div class="dash-card">
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Khóa Học</th>
              <th>Danh Mục</th>
              <th>Giá</th>
              <th>Đăng Ký</th>
              <th>Thao Tác</th>
            </tr>
          </thead>
          <tbody id="courses-table">
            <tr><td colspan="6" class="td-empty">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="admin-pagination" id="pagination-container"></div>
    </div>
  </div>
</div>

<!-- Modal add/edit course -->
<div class="admin-modal-overlay" id="modal-add-course" onclick="closeAdminModal(event,'modal-add-course')">
  <div class="admin-modal">
    <div class="am-header">
      <h2>📚 Thêm Khóa Học</h2>
      <button onclick="closeModal('modal-add-course')">✕</button>
    </div>
    <form class="am-form" onsubmit="saveCourse(event)">
      <input type="hidden" id="course-id" value="">
      <div class="am-field">
        <label>Tên Khóa Học</label>
        <input type="text" id="course-title" required>
      </div>
      <div class="am-field">
        <label>Danh Mục</label>
        <select id="course-category" required>
          <option value="">Chọn danh mục...</option>
        </select>
      </div>
      <div class="am-field">
        <label>Giá (VND)</label>
        <input type="number" id="course-price" value="0">
      </div>
      <div class="am-field">
        <label>Mô Tả</label>
        <textarea id="course-description" rows="4"></textarea>
      </div>
      <div class="am-footer">
        <button type="button" onclick="closeModal('modal-add-course')" class="btn-admin-ghost">Hủy</button>
        <button type="submit" class="btn-admin-primary">Lưu Khóa Học</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal confirm delete -->
<div class="admin-modal-overlay" id="modal-confirm-delete" onclick="closeAdminModal(event,'modal-confirm-delete')">
  <div class="admin-modal admin-modal-sm">
    <div class="am-header">
      <h2>⚠️ Xác Nhận Xóa</h2>
      <button onclick="closeModal('modal-confirm-delete')">✕</button>
    </div>
    <div class="am-confirm-body">
      <p>Xóa khóa học: <strong id="delete-course-name"></strong>?</p>
    </div>
    <div class="am-footer">
      <button onclick="closeModal('modal-confirm-delete')" class="btn-admin-ghost">Hủy</button>
      <button id="btn-confirm-delete" class="btn-admin-danger">Xóa Khóa Học</button>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="admin-toast" id="admin-toast"></div>

<script src="../../static/js/admin.js"></script>
<script>
let currentPage = 1;
let currentQuery = '';
let deleteCourseId = null;

async function loadCourses(page = 1, q = '') {
  currentPage = page;
  currentQuery = q;
  
  const url = `/api/admin/courses?page=${page}&q=${encodeURIComponent(q)}`;
  const res = await fetch(url);
  const data = await res.json();
  
  document.getElementById('total-courses').textContent = data.total || 0;
  
  const tbody = document.getElementById('courses-table');
  if (!data.courses || data.courses.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="td-empty">Không tìm thấy khóa học nào.</td></tr>';
  } else {
    tbody.innerHTML = data.courses.map(c => `
      <tr>
        <td class="td-id">${c.id}</td>
        <td><strong>${c.title || 'N/A'}</strong></td>
        <td>${c.category_name || 'N/A'}</td>
        <td>₫${(c.price || 0).toLocaleString('vi-VN')}</td>
        <td><span class="badge-enroll">${c.enroll_count || 0}</span></td>
        <td>
          <div class="td-actions">
            <button class="btn-view" onclick="editCourse(${c.id})" title="Sửa">✏️</button>
            <button class="btn-delete" onclick="deleteCourse(${c.id}, '${c.title}')" title="Xóa">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  }
  
  renderPagination(data.total_pages || 1, page, q);
}

function renderPagination(total_pages, current_page, q) {
  if (total_pages <= 1) {
    document.getElementById('pagination-container').innerHTML = '';
    return;
  }
  
  let html = '<div class="admin-pagination">';
  if (current_page > 1) {
    html += `<a href="#" onclick="loadCourses(${current_page-1}, '${q}'); return false;" class="pg-btn">←</a>`;
  }
  
  for (let p = 1; p <= total_pages; p++) {
    if (p === current_page) {
      html += `<span class="pg-btn active">${p}</span>`;
    } else if (p === 1 || p === total_pages || (p >= current_page-2 && p <= current_page+2)) {
      html += `<a href="#" onclick="loadCourses(${p}, '${q}'); return false;" class="pg-btn">${p}</a>`;
    }
  }
  
  if (current_page < total_pages) {
    html += `<a href="#" onclick="loadCourses(${current_page+1}, '${q}'); return false;" class="pg-btn">→</a>`;
  }
  
  html += '</div>';
  document.getElementById('pagination-container').innerHTML = html;
}

function searchCourses(e) {
  e.preventDefault();
  const q = document.getElementById('search-input').value;
  document.getElementById('clear-btn').style.display = q ? 'block' : 'none';
  loadCourses(1, q);
}

function clearSearch(e) {
  e.preventDefault();
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  loadCourses(1, '');
}

async function loadCategories() {
  const res = await fetch('/api/admin/categories');
  const data = await res.json();
  const select = document.getElementById('course-category');
  if (data.categories) {
    const html = `<option value="">Chọn danh mục...</option>` + 
      data.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    select.innerHTML = html;
  }
}

async function editCourse(id) {
  const res = await fetch(`/api/admin/courses/get/${id}`);
  const data = await res.json();
  const c = data.course;
  
  document.getElementById('course-id').value = c.id;
  document.getElementById('course-title').value = c.title;
  document.getElementById('course-category').value = c.category_id || '';
  document.getElementById('course-price').value = c.price || 0;
  document.getElementById('course-description').value = c.description || '';
  
  document.querySelector('#modal-add-course .am-header h2').textContent = '✏️ Sửa Khóa Học';
  openModal('modal-add-course');
}

async function saveCourse(e) {
  e.preventDefault();
  const id = document.getElementById('course-id').value;
  const method = id ? 'PUT' : 'POST';
  const url = id ? `/api/admin/courses/${id}` : '/api/admin/courses';
  
  const form = new FormData();
  form.append('title', document.getElementById('course-title').value);
  form.append('category_id', document.getElementById('course-category').value);
  form.append('price', document.getElementById('course-price').value);
  form.append('description', document.getElementById('course-description').value);
  
  const res = await fetch(url, {method, body: form});
  const data = await res.json();
  
  showAdminToast(data.message, data.success ? 'success' : 'error');
  if (data.success) {
    closeModal('modal-add-course');
    loadCourses(currentPage, currentQuery);
  }
}

function deleteCourse(id, title) {
  deleteCourseId = id;
  document.getElementById('delete-course-name').textContent = title;
  openModal('modal-confirm-delete');
}

document.getElementById('btn-confirm-delete').addEventListener('click', async () => {
  if (!deleteCourseId) return;
  const res = await fetch(`/api/admin/courses/${deleteCourseId}`, {method:'DELETE'});
  const data = await res.json();
  showAdminToast(data.message, data.success ? 'success' : 'error');
  if (data.success) {
    closeModal('modal-confirm-delete');
    loadCourses(currentPage, currentQuery);
  }
});

document.addEventListener('DOMContentLoaded', () => {
  loadCategories();
  loadCourses();
});
</script>
</body>
</html>
