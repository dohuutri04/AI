<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập Admin — EduConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../static/css/admin.css">
</head>
<body class="admin-body">

<div class="admin-login-wrap">
  <div class="admin-login-card">
    <div class="alc-brand">
      <span>🎓</span>
      <h1>EduConnect<br><span>Admin Panel</span></h1>
    </div>

    <div id="alert-container"></div>

    <form method="POST" action="/admin/login" class="alc-form" id="login-form">
      <div class="alc-field">
        <label>Email Quản Trị</label>
        <input type="email" name="email" placeholder="admin@educonnect.vn" required autofocus>
      </div>
      <div class="alc-field">
        <label>Mật Khẩu</label>
        <div class="alc-pass-wrap">
          <input type="password" name="password" id="admin-pass" placeholder="••••••••" required>
          <button type="button" class="alc-eye" onclick="togglePass()">👁</button>
        </div>
      </div>
      <button type="submit" class="alc-submit">Đăng Nhập →</button>
    </form>

    <div class="alc-hint">
      <p>Demo: <code>admin@educonnect.vn</code> / <code>admin123</code></p>
    </div>

    <a href="/" class="alc-back">← Quay về trang chủ</a>
  </div>
</div>

<script>
function togglePass() {
  const inp = document.getElementById('admin-pass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = new FormData(e.target);
  const res = await fetch('/admin/login', {
    method: 'POST',
    body: form
  });
  const data = await res.json();
  
  if (data.success) {
    window.location.href = 'dashboard.html';
  } else {
    const alertDiv = document.getElementById('alert-container');
    alertDiv.innerHTML = `<div class="alc-alert alc-alert-error">${data.message || 'Đăng nhập thất bại'}</div>`;
  }
});
</script>
</body>
</html>
